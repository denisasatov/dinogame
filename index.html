<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Theme Switcher -->
    <div class="theme-switcher">
        <button class="theme-btn theme-dark active" data-theme="dark" title="Тёмная тема">
            <i class="fas fa-moon"></i>
        </button>
        <button class="theme-btn theme-light" data-theme="light" title="Светлая тема">
            <i class="fas fa-sun"></i>
        </button>
        <button class="theme-btn theme-red" data-theme="red" title="Красная тема">
            <i class="fas fa-fire"></i>
        </button>
        <button class="theme-btn theme-neon" data-theme="neon" title="Неоновая тема">
            <i class="fas fa-bolt"></i>
        </button>
    </div>

    <div id="game-container">
        <!-- Header -->
        <div class="mb-6 text-center select-none">
            <h1 class="text-3xl font-pixel mb-1" style="color: var(--text-title);">DINO ADVENTURE</h1>
            <p class="text-sm" style="color: var(--text-subtitle);">Приглушенные тона доисторической эпохи</p>
        </div>

        <!-- HUD -->
        <div class="flex justify-between font-pixel text-[10px] mb-2 px-1 select-none" style="color: var(--text-primary);">
            <div id="high-score-display">HI 00000</div>
            <div id="score-display">00000</div>
        </div>

        <!-- Game Area -->
        <div class="relative rounded-lg overflow-hidden shadow-2xl" style="background-color: var(--bg-game-area); border: 1px solid var(--border-game-area);">
            <canvas id="gameCanvas" width="800" height="200"></canvas>

            <!-- Overlays -->
            <div id="start-overlay" class="overlay">
                <div>
                    <h2 class="text-lg font-pixel mb-6" style="color: var(--text-secondary);">START ADVENTURE</h2>
                    <p class="font-pixel text-[10px] animate-pulse" style="color: var(--text-subtitle);">КЛИКНИ ИЛИ НАЖМИ SPACE</p>
                </div>
            </div>

            <div id="pause-overlay" class="overlay hidden">
                <div>
                    <h2 class="text-lg font-pixel mb-6" style="color: var(--text-secondary);">ПАУЗА</h2>
                    <p class="font-pixel text-[10px] animate-pulse" style="color: var(--text-subtitle);">НАЖМИ ESC ДЛЯ ПРОДОЛЖЕНИЯ</p>
                </div>
            </div>

            <div id="game-over-overlay" class="overlay hidden">
                <div class="max-w-md w-full">
                    <h2 class="text-xl font-pixel mb-4" style="color: var(--text-title);">КОНЕЦ ПУТИ</h2>
                    <div class="p-4 rounded-lg border mb-6 min-h-[80px] flex items-center justify-center" style="background-color: var(--bg-button); border-color: var(--border-color);">
                        <p id="ai-message" class="italic text-sm leading-relaxed" style="color: var(--text-primary);">...</p>
                    </div>
                    <button id="retry-btn" class="px-8 py-3 font-pixel text-[10px] rounded transition-all active:scale-95" style="background-color: var(--bg-button); border: 1px solid var(--border-color); color: var(--text-primary);" onmouseover="this.style.backgroundColor='var(--bg-button-hover)'" onmouseout="this.style.backgroundColor='var(--bg-button)'">
                        ПОПРОБОВАТЬ СНОВА
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 flex justify-center gap-6 text-xs select-none" style="color: var(--text-secondary);">
            <span class="flex items-center gap-2"><kbd class="px-1 border rounded" style="background-color: var(--bg-kbd); border-color: var(--border-color);">Space</kbd> Прыжок</span>
            <span class="flex items-center gap-2"><kbd class="px-1 border rounded" style="background-color: var(--bg-kbd); border-color: var(--border-color);">Esc</kbd> Пауза</span>
            <span class="flex items-center gap-2"><i class="fas fa-robot opacity-40"></i> AI Мудрость</span>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
