
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        /* CSS Variables for theming */
        :root {
            /* Dark theme (default) */
            --bg-body: #0f172a;
            --bg-canvas: #0f172a;
            --bg-container: #0f172a;
            --bg-overlay: rgba(15, 23, 42, 0.85);
            --bg-button: #1e293b;
            --bg-button-hover: #334155;
            --bg-kbd: #1e293b;
            --bg-game-area: #0f172a;
            --border-color: #334155;
            --border-game-area: #1e293b;
            --text-primary: #94a3b8;
            --text-secondary: #64748b;
            --text-title: #64748b;
            --text-subtitle: #475569;
            --dino-color: #475569;
            --dino-spike: #64748b;
            --dino-eye: #94a3b8;
            --cactus-color: #166534;
            --bird-color: #86198f;
            --line-color: #1e293b;
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        /* Light theme */
        [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-canvas: #ffffff;
            --bg-container: #f1f5f9;
            --bg-overlay: rgba(241, 245, 249, 0.95);
            --bg-button: #e2e8f0;
            --bg-button-hover: #cbd5e1;
            --bg-kbd: #e2e8f0;
            --bg-game-area: #ffffff;
            --border-color: #cbd5e1;
            --border-game-area: #e2e8f0;
            --text-primary: #475569;
            --text-secondary: #64748b;
            --text-title: #334155;
            --text-subtitle: #64748b;
            --dino-color: #334155;
            --dino-spike: #475569;
            --dino-eye: #64748b;
            --cactus-color: #22c55e;
            --bird-color: #a855f7;
            --line-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        /* Red theme */
        [data-theme="red"] {
            --bg-body: #1a0505;
            --bg-canvas: #0f0202;
            --bg-container: #1a0505;
            --bg-overlay: rgba(26, 5, 5, 0.95);
            --bg-button: #450a0a;
            --bg-button-hover: #7f1d1d;
            --bg-kbd: #450a0a;
            --bg-game-area: #0f0202;
            --border-color: #7f1d1d;
            --border-game-area: #450a0a;
            --text-primary: #fca5a5;
            --text-secondary: #f87171;
            --text-title: #ef4444;
            --text-subtitle: #dc2626;
            --dino-color: #991b1b;
            --dino-spike: #b91c1c;
            --dino-eye: #fca5a5;
            --cactus-color: #166534;
            --bird-color: #be123c;
            --line-color: #450a0a;
            --shadow-color: rgba(220, 38, 38, 0.3);
        }

        /* Neon theme */
        [data-theme="neon"] {
            --bg-body: #0a0a0a;
            --bg-canvas: #050505;
            --bg-container: #0a0a0a;
            --bg-overlay: rgba(10, 10, 10, 0.95);
            --bg-button: #1a1a2e;
            --bg-button-hover: #16213e;
            --bg-kbd: #1a1a2e;
            --bg-game-area: #050505;
            --border-color: #00ff88;
            --border-game-area: #00ffff;
            --text-primary: #00ff88;
            --text-secondary: #00ffff;
            --text-title: #ff00ff;
            --text-subtitle: #00ffff;
            --dino-color: #00ff88;
            --dino-spike: #00ffff;
            --dino-eye: #ff00ff;
            --cactus-color: #00ff00;
            --bird-color: #ff00ff;
            --line-color: #1a1a2e;
            --shadow-color: rgba(0, 255, 136, 0.3);
        }

        body {
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: ui-sans-serif, system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .font-pixel {
            font-family: 'Press+Start+2P', cursive;
        }
        #game-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            padding: 20px;
        }
        canvas {
            background-color: var(--bg-canvas);
            width: 100%;
            height: auto;
            display: block;
            transition: background-color 0.3s ease;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-overlay);
            text-align: center;
            padding: 20px;
            z-index: 20;
            transition: background 0.3s ease;
        }
        .hidden { display: none !important; }
        #start-overlay { cursor: pointer; }
        
        /* Theme switcher styles */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
            background: var(--bg-button);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px var(--shadow-color);
            transition: all 0.3s ease;
        }
        
        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .theme-btn:hover {
            transform: scale(1.1);
        }
        
        .theme-btn.active {
            border-color: var(--text-primary);
            box-shadow: 0 0 10px var(--shadow-color);
        }
        
        .theme-dark { background: #0f172a; color: #94a3b8; }
        .theme-light { background: #f1f5f9; color: #475569; }
        .theme-red { background: #450a0a; color: #fca5a5; }
        .theme-neon { background: #0a0a0a; color: #00ff88; border: 1px solid #00ff88; }
        
        /* Neon theme special effects */
        [data-theme="neon"] .theme-btn {
            box-shadow: 0 0 5px currentColor;
        }
        
        [data-theme="neon"] .theme-btn.active {
            box-shadow: 0 0 15px currentColor, 0 0 30px currentColor;
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
      }
    }
    </script>
</head>
<body>
    <!-- Theme Switcher -->
    <div class="theme-switcher">
        <button class="theme-btn theme-dark active" data-theme="dark" title="Тёмная тема">
            <i class="fas fa-moon"></i>
        </button>
        <button class="theme-btn theme-light" data-theme="light" title="Светлая тема">
            <i class="fas fa-sun"></i>
        </button>
        <button class="theme-btn theme-red" data-theme="red" title="Красная тема">
            <i class="fas fa-fire"></i>
        </button>
        <button class="theme-btn theme-neon" data-theme="neon" title="Неоновая тема">
            <i class="fas fa-bolt"></i>
        </button>
    </div>

    <div id="game-container">
        <!-- Header -->
        <div class="mb-6 text-center select-none">
            <h1 class="text-3xl font-pixel mb-1" style="color: var(--text-title);">DINO ADVENTURE</h1>
            <p class="text-sm" style="color: var(--text-subtitle);">Приглушенные тона доисторической эпохи</p>
        </div>

        <!-- HUD -->
        <div class="flex justify-between font-pixel text-[10px] mb-2 px-1 select-none" style="color: var(--text-primary);">
            <div id="high-score-display">HI 00000</div>
            <div id="score-display">00000</div>
        </div>

        <!-- Game Area -->
        <div class="relative rounded-lg overflow-hidden shadow-2xl" style="background-color: var(--bg-game-area); border: 1px solid var(--border-game-area);">
            <canvas id="gameCanvas" width="800" height="200"></canvas>

            <!-- Overlays -->
            <div id="start-overlay" class="overlay">
                <div>
                    <h2 class="text-lg font-pixel mb-6" style="color: var(--text-secondary);">START ADVENTURE</h2>
                    <p class="font-pixel text-[10px] animate-pulse" style="color: var(--text-subtitle);">КЛИКНИ ИЛИ НАЖМИ SPACE</p>
                </div>
            </div>

            <div id="pause-overlay" class="overlay hidden">
                <div>
                    <h2 class="text-lg font-pixel mb-6" style="color: var(--text-secondary);">ПАУЗА</h2>
                    <p class="font-pixel text-[10px] animate-pulse" style="color: var(--text-subtitle);">НАЖМИ ESC ДЛЯ ПРОДОЛЖЕНИЯ</p>
                </div>
            </div>

            <div id="game-over-overlay" class="overlay hidden">
                <div class="max-w-md w-full">
                    <h2 class="text-xl font-pixel mb-4" style="color: var(--text-title);">КОНЕЦ ПУТИ</h2>
                    <div class="p-4 rounded-lg border mb-6 min-h-[80px] flex items-center justify-center" style="background-color: var(--bg-button); border-color: var(--border-color);">
                        <p id="ai-message" class="italic text-sm leading-relaxed" style="color: var(--text-primary);">...</p>
                    </div>
                    <button id="retry-btn" class="px-8 py-3 font-pixel text-[10px] rounded transition-all active:scale-95" style="background-color: var(--bg-button); border: 1px solid var(--border-color); color: var(--text-primary);" onmouseover="this.style.backgroundColor='var(--bg-button-hover)'" onmouseout="this.style.backgroundColor='var(--bg-button)'">
                        ПОПРОБОВАТЬ СНОВА
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 flex justify-center gap-6 text-xs select-none" style="color: var(--text-secondary);">
            <span class="flex items-center gap-2"><kbd class="px-1 border rounded" style="background-color: var(--bg-kbd); border-color: var(--border-color);">Space</kbd> Прыжок</span>
            <span class="flex items-center gap-2"><kbd class="px-1 border rounded" style="background-color: var(--bg-kbd); border-color: var(--border-color);">Esc</kbd> Пауза</span>
            <span class="flex items-center gap-2"><i class="fas fa-robot opacity-40"></i> AI Мудрость</span>
        </div>
    </div>

    <script type="module">
        // DOM Элементы
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const startOverlay = document.getElementById('start-overlay');
        const pauseOverlay = document.getElementById('pause-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const aiMessageDisplay = document.getElementById('ai-message');
        const retryBtn = document.getElementById('retry-btn');

        // Константы
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 200;
        const GRAVITY = 0.8;
        const JUMP_FORCE = -14;
        const INITIAL_SPEED = 5;
        const SPEED_INCREMENT = 0.0007;

        // Состояние
        let status = 'IDLE';
        let score = 0;
        let highScore = 0;
        let speed = INITIAL_SPEED;
        let frameCount = 0;
        let obstacles = [];
        let dino = {
            x: 50,
            y: CANVAS_HEIGHT - 50,
            width: 40,
            height: 40,
            dy: 0,
            grounded: true,
            legFrame: 0
        };

        // Theme switcher
        const themeBtns = document.querySelectorAll('.theme-btn');
        const root = document.documentElement;

        // Get computed CSS variable value
        function getCSSVariable(name) {
            return getComputedStyle(root).getPropertyValue(name).trim();
        }

        function setTheme(theme) {
            root.setAttribute('data-theme', theme);
            localStorage.setItem('dino-theme', theme);
            
            // Update active state on buttons
            themeBtns.forEach(btn => {
                if (btn.dataset.theme === theme) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Redraw canvas with new colors
            if (status !== 'PLAYING') {
                draw();
            }
        }

        // Load saved theme or use default
        const savedTheme = localStorage.getItem('dino-theme') || 'dark';
        setTheme(savedTheme);

        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                setTheme(theme);
            });
        });

        // Мудрые цитаты динозаврика
        const dinoQuotes = [
            "Дорога важнее цели.",
            "Каждое падение — это начало нового прыжка.",
            "Препятствия делают нас сильнее.",
            "Главное — не сдаваться.",
            "Путь в тысячу миль начинается с одного шага.",
            "Ошибки — лучшие учителя.",
            "Терпение и труд всё перетрут.",
            "Не важно, как медленно ты идёшь.",
            "Падать — не значит проигрывать.",
            "Каждая попытка приближает к победе."
        ];

        function getDinoWisdom() {
            return dinoQuotes[Math.floor(Math.random() * dinoQuotes.length)];
        }

        function resetGame() {
            score = 0;
            speed = INITIAL_SPEED;
            frameCount = 0;
            obstacles = [];
            dino.y = CANVAS_HEIGHT - dino.height;
            dino.dy = 0;
            dino.grounded = true;
            status = 'PLAYING';
            
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            scoreDisplay.textContent = "00000";
            requestAnimationFrame(gameLoop);
        }

        function handleGameOver() {
            status = 'GAME_OVER';
            gameOverOverlay.classList.remove('hidden');
            
            const finalScore = Math.floor(score);
            if (finalScore > highScore) {
                highScore = finalScore;
                highScoreDisplay.textContent = `HI ${highScore.toString().padStart(5, '0')}`;
            }

            const message = getDinoWisdom();
            aiMessageDisplay.textContent = message;
        }

        function update() {
            if (status !== 'PLAYING') return;

            if (!dino.grounded) {
                dino.dy += GRAVITY;
                dino.y += dino.dy;
            }
            if (dino.y > CANVAS_HEIGHT - dino.height) {
                dino.y = CANVAS_HEIGHT - dino.height;
                dino.dy = 0;
                dino.grounded = true;
            }

            frameCount++;
            if (frameCount % Math.floor(130 / (speed / 5)) === 0) {
                const type = Math.random() > 0.8 ? 'bird' : 'cactus';
                const h = type === 'cactus' ? 25 + Math.random() * 20 : 25;
                const y = type === 'cactus' ? CANVAS_HEIGHT - h : CANVAS_HEIGHT - 70 - Math.random() * 30;
                obstacles.push({ x: CANVAS_WIDTH, y, width: 20, height: h, type });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= speed;
                if (
                    dino.x + 12 < obs.x + obs.width - 4 &&
                    dino.x + dino.width - 12 > obs.x + 4 &&
                    dino.y + 10 < obs.y + obs.height - 4 &&
                    dino.y + dino.height - 4 > obs.y + 4
                ) {
                    handleGameOver();
                    return;
                }
                if (obs.x + obs.width < 0) obstacles.splice(i, 1);
            }

            speed += SPEED_INCREMENT;
            score += 0.1;
            scoreDisplay.textContent = Math.floor(score).toString().padStart(5, '0');
            
            // Animate legs when on ground
            if (dino.grounded) {
                dino.legFrame += speed * 0.1;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw line
            ctx.strokeStyle = getCSSVariable('--line-color');
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, CANVAS_HEIGHT - 1);
            ctx.lineTo(CANVAS_WIDTH, CANVAS_HEIGHT - 1);
            ctx.stroke();

            // Dino
            ctx.fillStyle = getCSSVariable('--dino-color');
            ctx.fillRect(dino.x + 5, dino.y + 15, 25, 20);
            ctx.fillRect(dino.x + 20, dino.y + 5, 18, 15);
            ctx.fillRect(dino.x + 30, dino.y + 8, 10, 8);
            ctx.beginPath();
            ctx.moveTo(dino.x + 5, dino.y + 20);
            ctx.lineTo(dino.x - 8, dino.y + 32);
            ctx.lineTo(dino.x + 5, dino.y + 35);
            ctx.fill();
            // Spikes
            ctx.fillStyle = getCSSVariable('--dino-spike');
            for(let i = 0; i < 3; i++) {
                ctx.beginPath();
                const sx = dino.x + 8 + (i * 7);
                const sy = dino.y + 15;
                ctx.moveTo(sx, sy); ctx.lineTo(sx + 3, sy - 5); ctx.lineTo(sx + 6, sy);
                ctx.fill();
            }
            // Legs animation
            ctx.fillStyle = getCSSVariable('--dino-color');
            const legOffset = dino.grounded ? Math.sin(dino.legFrame) * 3 : 4;
            if (dino.grounded) {
                // Running animation - alternating legs
                const leftLegY = Math.sin(dino.legFrame) > 0 ? 0 : 4;
                const rightLegY = Math.sin(dino.legFrame) > 0 ? 4 : 0;
                ctx.fillRect(dino.x + 10, dino.y + 35 - leftLegY, 6, 5 + leftLegY);
                ctx.fillRect(dino.x + 22, dino.y + 35 - rightLegY, 6, 5 + rightLegY);
            } else {
                // Jumping pose - legs spread (higher by 3px, visible)
                ctx.fillRect(dino.x + 7, dino.y + 32, 6, 5);
                ctx.fillRect(dino.x + 25, dino.y + 32, 6, 5);
            }
            ctx.fillStyle = getCSSVariable('--dino-eye');
            ctx.fillRect(dino.x + 32, dino.y + 8, 3, 3);

            // Obs
            obstacles.forEach(obs => {
                ctx.fillStyle = getCSSVariable(obs.type === 'cactus' ? '--cactus-color' : '--bird-color');
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
        }

        function gameLoop() {
            if (status !== 'PLAYING') return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleJump(e) {
            if (e) e.preventDefault();
            if (status === 'PLAYING' && dino.grounded) {
                dino.dy = JUMP_FORCE;
                dino.grounded = false;
            } else if (status === 'IDLE') {
                resetGame();
            }
        }

        // Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Escape' && (status === 'PLAYING' || status === 'PAUSED')) {
                togglePause();
            } else if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) {
                handleJump(e);
            }
        });

        function togglePause() {
            if (status === 'PLAYING') {
                status = 'PAUSED';
                pauseOverlay.classList.remove('hidden');
            } else if (status === 'PAUSED') {
                status = 'PLAYING';
                pauseOverlay.classList.add('hidden');
                requestAnimationFrame(gameLoop);
            }
        }
        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('touchstart', handleJump);
        startOverlay.addEventListener('mousedown', () => { if(status === 'IDLE') resetGame(); });
        retryBtn.addEventListener('click', (e) => { e.stopPropagation(); resetGame(); });

        draw();
    </script>
</body>
</html>
